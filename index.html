<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>តេស្តនិយាយភាសាកូរ៉េ — អនុវត្ត</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+Khmer:wght@300;400;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper2: #ede7d9;
    --accent: #c0392b;
    --accent2: #e67e22;
    --muted: #8a7e6e;
    --green: #27ae60;
    --border: #c8b89a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139,124,100,0.08) 27px, rgba(139,124,100,0.08) 28px);
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 24px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 3px solid var(--accent);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    letter-spacing: 0.02em;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .progress-bar { height: 3px; background: var(--paper2); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 40px 24px; }

  .question-card {
    background: white;
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
    border-radius: 2px;
    padding: 36px 40px;
    box-shadow: 4px 4px 0 var(--paper2), 8px 8px 0 var(--border);
    margin-bottom: 28px;
    animation: slideIn 0.35s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

  .q-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 1px;
  }

  .q-counter { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .q-prompt { font-size: 19px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; color: var(--ink); }

  .q-pattern {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    margin-bottom: 8px;
  }

  .q-hint {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.7;
  }

  .q-hint .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }

  .btn-record {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .btn-record:hover { background: #a93226; transform: translateY(-1px); }
  .btn-record.recording { background: var(--green); animation: pulse 1.2s infinite; }
  .btn-record.recording:hover { background: #229954; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(39,174,96,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(39,174,96,0); }
  }

  .dot { width: 10px; height: 10px; background: white; border-radius: 50%; flex-shrink: 0; }
  .btn-record.recording .dot { border-radius: 2px; }

  .timer {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 300;
    color: var(--ink);
    min-width: 60px;
    letter-spacing: 0.05em;
  }

  .waveform { display: flex; align-items: center; gap: 3px; height: 30px; opacity: 0; transition: opacity 0.3s; }
  .waveform.active { opacity: 1; }
  .waveform-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
    min-height: 4px;
  }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  .answer-section { display: none; }
  .answer-section.visible { display: block; animation: slideIn 0.3s ease; }

  /* Custom audio player */
  .audio-player-custom {
    background: var(--paper2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .audio-play-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .audio-play-btn:hover { background: var(--accent); }
  .audio-play-btn svg { fill: white; }

  .audio-progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .audio-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  .audio-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 40px;
    text-align: right;
  }

  /* Hidden native audio for fallback */
  audio { display: none; }

  .btn-check {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px;
    font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-check:hover { background: #2c2213; }
  .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }

  .feedback-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px 28px;
    display: none;
    animation: slideIn 0.3s ease;
  }
  .feedback-box.visible { display: block; }

  .feedback-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .score-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    padding: 4px 12px;
    border-radius: 1px;
  }
  .score-great { background: #d5f5e3; color: #1a7a44; border: 1px solid #27ae60; }
  .score-ok { background: #fef9e7; color: #7d6608; border: 1px solid #f0b429; }
  .score-retry { background: #fdedec; color: #922b21; border: 1px solid var(--accent); }

  .feedback-text { font-size: 14px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; }

  .model-answer {
    margin-top: 16px;
    background: var(--paper);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .model-answer .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .nav-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; margin-top: 8px; }

  .btn-nav {
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 11px 24px;
    font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    flex: 1;
  }
  .btn-nav:hover { background: var(--ink); color: var(--paper); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-nav.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-nav.primary:hover { background: #2c2213; }

  .mode-selector {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 2px solid var(--ink);
    border-radius: 2px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
    letter-spacing: 0.04em;
    transition: all 0.2s;
    border-right: 1px solid var(--ink);
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn.active { background: var(--ink); color: var(--paper); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .skeleton {
    background: linear-gradient(90deg, var(--paper2) 25%, var(--border) 50%, var(--paper2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
    height: 16px;
    margin-bottom: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .no-mic-msg {
    display: none;
    background: #fff3cd;
    border: 1px solid #ffc107;
    color: #856404;
    padding: 12px 16px;
    font-size: 13px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .btn-speak {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1.5px solid var(--accent2);
    color: var(--accent2);
    padding: 6px 14px;
    font-family: 'Noto Sans Khmer', serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-speak:hover { background: var(--accent2); color: white; }
  .btn-speak.speaking { background: var(--accent2); color: white; }

  /* Self-assessment panel (shown after recording since AI can't hear audio) */
  .self-check {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.8;
  }
  .self-check .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .self-check-items { list-style: none; }
  .self-check-items li { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .self-check-items li::before { content: '☐'; font-size: 16px; line-height: 1.2; color: var(--accent); flex-shrink: 0; }

  .api-banner {
    background: #fffbf0;
    border-bottom: 2px solid var(--accent2);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .api-banner label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .api-banner input { flex: 1; min-width: 180px; font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 2px; background: white; color: var(--ink); outline: none; }
  .api-banner input:focus { border-color: var(--accent2); }
  .api-banner input.saved { border-color: var(--green); background: #f0faf4; }
  .api-save-btn { font-family: 'Noto Sans Khmer', serif; font-size: 12px; font-weight: 600; padding: 7px 16px; background: var(--accent2); color: white; border: none; border-radius: 2px; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .api-save-btn:hover { background: #d35400; }
  .api-status { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); display: none; }
  .api-status.visible { display: inline; }
  .api-help { font-size: 11px; color: var(--muted); width: 100%; margin-top: 2px; }
  .api-help a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>តេស្តនិយាយភាសាកូរ៉េ — អនុវត្ត</h1>
  <span>Korean Oral Test Practice · មីនា</span>
</header>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

</div>

<div class="container">

  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('all')">ទាំងអស់</button>
    <button class="mode-btn" onclick="setMode('q01')">Q01 ម៉ោង</button>
    <button class="mode-btn" onclick="setMode('q02')">Q02 តម្លៃ</button>
    <button class="mode-btn" onclick="setMode('q03')">Q03 លេខ</button>
    <button class="mode-btn" onclick="setMode('q04')">Q04 ទីកន្លែង</button>
    <button class="mode-btn" onclick="setMode('free')">សន្ទនា</button>
  </div>

  <div id="test-area">
    <div class="question-card" id="question-card">
      <div class="q-meta">
        <span class="q-tag" id="q-tag">Q01</span>
        <span class="q-counter" id="q-counter">1 / 30</span>
      </div>
      <div class="q-prompt" id="q-prompt">Loading...</div>
      <div class="q-pattern" id="q-pattern"></div>
      <button class="btn-speak" id="btn-speak" onclick="speakQuestion()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <span id="speak-label">ស្តាប់សំណួរ</span>
      </button>
      <div class="q-hint" id="q-hint" style="display:none">
        <div class="label">ព័ត៌មានជំនួយ / Input</div>
        <div id="q-hint-text"></div>
      </div>
    </div>

    <div class="no-mic-msg" id="no-mic-msg">
      ⚠️ មិនអាចចូលដំណើរការមីក្រូហ្វូនបានទេ។ សូមអនុញ្ញាតការចូលដំណើរការក្នុងការកំណត់កម្មវិធីរុករករបស់អ្នក។
    </div>

    <div class="controls">
      <button class="btn-record" id="btn-record" onclick="toggleRecord()">
        <div class="dot"></div>
        <span id="btn-label">ចាប់ផ្តើមថត</span>
      </button>
      <div class="timer" id="timer">0:00</div>
      <div class="waveform" id="waveform">
        <div class="waveform-bar" style="animation-delay:0s"></div>
        <div class="waveform-bar" style="animation-delay:0.1s"></div>
        <div class="waveform-bar" style="animation-delay:0.2s"></div>
        <div class="waveform-bar" style="animation-delay:0.15s"></div>
        <div class="waveform-bar" style="animation-delay:0.05s"></div>
        <div class="waveform-bar" style="animation-delay:0.25s"></div>
        <div class="waveform-bar" style="animation-delay:0.1s"></div>
      </div>
    </div>

    <div class="answer-section" id="answer-section">

      <!-- Custom audio player -->
      <div class="audio-player-custom" id="audio-player-custom">
        <button class="audio-play-btn" id="audio-play-btn" onclick="toggleAudioPlay()">
          <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="audio-progress-wrap" id="audio-progress-wrap" onclick="seekAudio(event)">
          <div class="audio-progress-fill" id="audio-progress-fill"></div>
        </div>
        <div class="audio-time" id="audio-time">0:00</div>
      </div>

      <!-- Hidden native audio element -->
      <audio id="audio-playback"></audio>

      <!-- Self-check list shown before AI feedback -->
      <div class="self-check" id="self-check" style="display:none">
        <div class="label">ពិនិត្យខ្លួនឯង / Self-check</div>
        <ul class="self-check-items" id="self-check-items"></ul>
      </div>

      <button class="btn-check" id="btn-check" onclick="checkAnswer()">
        <span id="check-label">ទទួលមតិយោបល់ AI ✦</span>
      </button>

      <div class="feedback-box" id="feedback-box">
        <div class="feedback-header">
          <span id="feedback-title" style="font-weight:600;font-size:15px;">មតិយោបល់</span>
          <span class="score-badge" id="score-badge"></span>
        </div>
        <div class="feedback-text" id="feedback-text"></div>
        <div class="model-answer" id="model-answer-box">
          <div class="label">ចម្លើយគំរូ / Model Answer</div>
          <div id="model-answer-text"></div>
        </div>
      </div>
    </div>

    <div class="nav-row" style="margin-top:20px;">
      <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">← មុន</button>
      <button class="btn-nav primary" id="btn-next" onclick="navigate(1)">បន្ទាប់ →</button>
    </div>
  </div>

</div>

<script>
// ── Question bank ──────────────────────────────────────────────
const QUESTIONS = [
  { tag:'Q01', pattern:'[도시]은/는 지금 [시간]이에요.', prompt:'서울은 지금 몇 시예요?', hint:'12:30', answer:'서울은 지금 열두 시 삼십 분이에요.',
    checks:['열두 (yeoldu) = 12 — ណាមួយ?','삼십 (samsip) = 30 — បានអានត្រឹមត្រូវទេ?','ប្រើ 이에요 នៅចុង?'] },
  { tag:'Q01', pattern:'[도시]은/는 지금 [시간]이에요.', prompt:'베이징은 지금 몇 시예요?', hint:'4:50', answer:'베이징은 지금 네 시 오십 분이에요.',
    checks:['네 (ne) = 4','오십 (osip) = 50','베이징은 — 은 ត្រូវប្រើ'] },
  { tag:'Q01', pattern:'[도시]은/는 지금 [시간]이에요.', prompt:'모스크바는 지금 몇 시예요?', hint:'5:23', answer:'모스크바는 지금 다섯 시 이십삼 분이에요.',
    checks:['다섯 (daseot) = 5','이십삼 (isimsam) = 23','모스크바는 — 는 ត្រូវប្រើ'] },
  { tag:'Q01', pattern:'[도시]은/는 지금 [시간]이에요.', prompt:'도쿄는 지금 몇 시예요?', hint:'6:47', answer:'도쿄는 지금 여섯 시 사십칠 분이에요.',
    checks:['여섯 (yeoseot) = 6','사십칠 (sasipchil) = 47','ប្រើ분 (bun) សម្រាប់នាទី'] },

const MODES = {
  all: QUESTIONS,
  q01: QUESTIONS.filter(q => q.tag === 'Q01'),
  q02: QUESTIONS.filter(q => q.tag === 'Q02'),
  q03: QUESTIONS.filter(q => q.tag === 'Q03'),
  q04: QUESTIONS.filter(q => q.tag === 'Q04'),
  free: QUESTIONS.filter(q => q.tag === '자유'),
};

let currentMode = 'all';
let questions = [...QUESTIONS];
let currentIndex = 0;

let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let recordingInterval = null;
let recordSeconds = 0;
let isRecording = false;
let audioContext = null;
let currentAudio = null;

// ── Get best supported MIME type ──────────────────────────────
function getSupportedMimeType() {
  const types = [
    'audio/mp4',
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/ogg',
  ];
  for (const type of types) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }
  return ''; // let browser choose
}

function setMode(mode) {
  currentMode = mode;
  questions = [...MODES[mode]];
  currentIndex = 0;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','q01','q02','q03','q04','free'][i] === mode);
  });
  resetQuestion();
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-counter').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('q-prompt').textContent = q.prompt;
  document.getElementById('q-pattern').textContent = 'គំរូ: ' + q.pattern;
  document.getElementById('q-hint').style.display = 'block';
  document.getElementById('q-hint-text').textContent = q.hint;
  document.getElementById('model-answer-text').textContent = q.answer;
  document.getElementById('progress').style.width = ((currentIndex + 1) / questions.length * 100) + '%';
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === questions.length - 1;
  resetQuestion();
}

function resetQuestion() {
  stopSpeech();
  silentStopRecording();
  stopAudio();
  document.getElementById('answer-section').classList.remove('visible');
  document.getElementById('feedback-box').classList.remove('visible');
  document.getElementById('self-check').style.display = 'none';
  document.getElementById('btn-record').className = 'btn-record';
  document.getElementById('btn-label').textContent = 'ចាប់ផ្តើមថត';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('audio-progress-fill').style.width = '0%';
  document.getElementById('audio-time').textContent = '0:00';
  audioBlob = null;
  audioChunks = [];
  isRecording = false;
}

async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioChunks = [];

    const mimeType = getSupportedMimeType();
    const options = mimeType ? { mimeType } : {};

    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());

      const mime = mediaRecorder.mimeType || mimeType || 'audio/webm';
      audioBlob = new Blob(audioChunks, { type: mime });

      // Revoke any previous URL
      const audioEl = document.getElementById('audio-playback');
      if (audioEl.src) URL.revokeObjectURL(audioEl.src);

      const url = URL.createObjectURL(audioBlob);
      audioEl.src = url;
      audioEl.load();

      // Setup custom player events
      audioEl.onloadedmetadata = () => {
        document.getElementById('audio-time').textContent = formatTime(audioEl.duration || 0);
      };
      audioEl.ontimeupdate = updateAudioProgress;
      audioEl.onended = () => {
        document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      };
      audioEl.onerror = (e) => {
        console.warn('Audio element error:', e);
        // Show native audio as fallback
        audioEl.style.display = 'block';
        document.getElementById('audio-player-custom').style.display = 'none';
      };

      document.getElementById('answer-section').classList.add('visible');
      document.getElementById('feedback-box').classList.remove('visible');

      // Show self-check list
      const q = questions[currentIndex];
      const list = document.getElementById('self-check-items');
      list.innerHTML = q.checks.map(c => `<li>${c}</li>`).join('');
      document.getElementById('self-check').style.display = 'block';
    };

    // Collect data every 250ms for reliability
    mediaRecorder.start(250);
    isRecording = true;
    recordSeconds = 0;

    document.getElementById('btn-record').className = 'btn-record recording';
    document.getElementById('btn-label').textContent = 'ឈប់ថត';
    document.getElementById('waveform').classList.add('active');
    document.getElementById('no-mic-msg').style.display = 'none';

    recordingInterval = setInterval(() => {
      recordSeconds++;
      const m = Math.floor(recordSeconds / 60);
      const s = recordSeconds % 60;
      document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
      if (recordSeconds >= 30) stopRecording();
    }, 1000);

  } catch (e) {
    console.error('Mic error:', e);
    document.getElementById('no-mic-msg').style.display = 'block';
  }
}

function stopRecording() {
  if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  document.getElementById('btn-record').className = 'btn-record';
  document.getElementById('btn-label').textContent = 'ថតម្តងទៀត';
  document.getElementById('waveform').classList.remove('active');
}

function silentStopRecording() {
  if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch(e) {}
  }
  isRecording = false;
}

// ── Custom audio player controls ──────────────────────────────
function toggleAudioPlay() {
  const audio = document.getElementById('audio-playback');
  if (!audio.src) return;
  if (audio.paused) {
    audio.play().catch(e => {
      console.warn('Play failed:', e);
      audio.style.display = 'block';
      document.getElementById('audio-player-custom').style.display = 'none';
      audio.play();
    });
    document.getElementById('play-icon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    audio.pause();
    document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  }
}

function stopAudio() {
  const audio = document.getElementById('audio-playback');
  audio.pause();
  try { audio.currentTime = 0; } catch(e) {}
  document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  document.getElementById('audio-progress-fill').style.width = '0%';
}

function updateAudioProgress() {
  const audio = document.getElementById('audio-playback');
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('audio-progress-fill').style.width = pct + '%';
    document.getElementById('audio-time').textContent = formatTime(audio.currentTime);
  }
}

function seekAudio(e) {
  const audio = document.getElementById('audio-playback');
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

        messages: [{
          role: 'user',
          content: `ខ្ញុំបានថតចម្លើយរបស់ខ្ញុំហើយ។ សំណួរ: "${q.prompt}". ចម្លើយគំរូ: "${q.answer}". 
សូមផ្តល់ការណែនាំលម្អិតជាភាសាខ្មែរ ដើម្បីជួយខ្ញុំពិនិត្យថាខ្ញុំបាននិយាយត្រឹមត្រូវ ជាពិសេសសំឡេង និងឃ្លា key។ 
ប្រើទម្រង់: ពិន្ទុ: / មតិយោបល់: / គន្លឹះ:`
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.map(c => c.text || '').join('') || '';
    parseFeedback(text, q.answer);
  } catch(e) {
    document.getElementById('feedback-text').textContent =
      'មិនអាចទាញយកមតិយោបល់បានទេ។ (' + (e.message || 'Error') + ') សូមពិនិត្យការតភ្ជាប់អ៊ីនធឺណិតរបស់អ្នក។';
  }

  btn.disabled = false;
  label.innerHTML = 'ទទួលមតិយោបល់ AI ✦';
}

function parseFeedback(text, modelAnswer) {
  const scoreMatch = text.match(/ពិន្ទុ\s*[:៖]\s*(.+)/);
  const score = scoreMatch ? scoreMatch[1].trim() : '';

  const feedbackMatch = text.match(/មតិយោបល់\s*[:៖]\s*([\s\S]*?)(?=គន្លឹះ\s*[:៖]|$)/);
  const tipMatch = text.match(/គន្លឹះ\s*[:៖]\s*([\s\S]*)/);

  let feedbackText = text;
  if (feedbackMatch) {
    feedbackText = feedbackMatch[1].trim();
    if (tipMatch) feedbackText += '\n\n💡 ' + tipMatch[1].trim();
  }

  const badge = document.getElementById('score-badge');
  badge.textContent = score || 'មតិយោបល់';
  if (score.includes('ល្អណាស់')) badge.className = 'score-badge score-great';
  else if (score.includes('ល្អ')) badge.className = 'score-badge score-ok';
  else if (score.includes('សាក')) badge.className = 'score-badge score-retry';
  else badge.className = 'score-badge score-ok';

  document.getElementById('feedback-text').textContent = feedbackText || text;
  document.getElementById('model-answer-box').style.display = 'block';
  document.getElementById('model-answer-text').textContent = modelAnswer;
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next < 0 || next >= questions.length) return;
  currentIndex = next;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function speakQuestion() {
  const q = questions[currentIndex];
  const btn = document.getElementById('btn-speak');
  const label = document.getElementById('speak-label');

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    label.textContent = 'ស្តាប់សំណួរ';
    return;
  }

  const utter = new SpeechSynthesisUtterance(q.prompt);
  utter.lang = 'ko-KR';
  utter.rate = 0.85;
  utter.pitch = 1;

  const voices = window.speechSynthesis.getVoices();
  const korVoice = voices.find(v => v.lang.startsWith('ko'));
  if (korVoice) utter.voice = korVoice;

  utter.onstart = () => { btn.classList.add('speaking'); label.textContent = 'កំពុងនិយាយ...'; };
  utter.onend = utter.onerror = () => { btn.classList.remove('speaking'); label.textContent = 'ស្តាប់សំណួរ'; };

  window.speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (window.speechSynthesis?.speaking) window.speechSynthesis.cancel();
  const btn = document.getElementById('btn-speak');
  const label = document.getElementById('speak-label');
  if (btn) btn.classList.remove('speaking');
  if (label) label.textContent = 'ស្តាប់សំណួរ';
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

renderQuestion();
</script>
</body>
</html>
