<!DOCTYPE html>
<html lang="km">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>តេស្តនិយាយភាសាកូរ៉េ — អនុវត្ត</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+Khmer:wght@300;400;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,700;1,500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #1a1208;
      --paper: #f5f0e8;
      --paper2: #ede7d9;
      --accent: #c0392b;
      --accent2: #e67e22;
      --muted: #8a7e6e;
      --green: #27ae60;
      --border: #c8b89a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(139, 124, 100, 0.08) 27px, rgba(139, 124, 100, 0.08) 28px);
    }

    header {
      background: var(--ink);
      color: var(--paper);
      padding: 24px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 3px solid var(--accent);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .progress-bar {
      height: 3px;
      background: var(--paper2);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s ease;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .question-card {
      background: white;
      border: 1px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 2px;
      padding: 36px 40px;
      box-shadow: 4px 4px 0 var(--paper2), 8px 8px 0 var(--border);
      margin-bottom: 28px;
      animation: slideIn 0.35s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .q-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .q-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 1px;
    }

    .q-counter {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .q-prompt {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 12px;
      color: var(--ink);
    }

    .q-pattern {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 10px;
      margin-bottom: 8px;
    }

    .q-hint {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.7;
    }

    .q-hint .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn-record {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 28px;
      font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .btn-record:hover {
      background: #a93226;
      transform: translateY(-1px);
    }

    .btn-record.recording {
      background: var(--green);
      animation: pulse 1.2s infinite;
    }

    .btn-record.recording:hover {
      background: #229954;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(39, 174, 96, 0);
      }
    }

    .dot {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-record.recording .dot {
      border-radius: 2px;
    }

    .timer {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 300;
      color: var(--ink);
      min-width: 60px;
      letter-spacing: 0.05em;
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .waveform.active {
      opacity: 1;
    }

    .waveform-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite;
      min-height: 4px;
    }

    @keyframes wave {

      0%,
      100% {
        transform: scaleY(0.3);
      }

      50% {
        transform: scaleY(1);
      }
    }

    .answer-section {
      display: none;
    }

    .answer-section.visible {
      display: block;
      animation: slideIn 0.3s ease;
    }

    /* Custom audio player */
    .audio-player-custom {
      background: var(--paper2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .audio-play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .audio-play-btn:hover {
      background: var(--accent);
    }

    .audio-play-btn svg {
      fill: white;
    }

    .audio-progress-wrap {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .audio-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .audio-time {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 40px;
      text-align: right;
    }

    /* Hidden native audio for fallback */
    audio {
      display: none;
    }

    .btn-check {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      padding: 16px;
      font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-check:hover {
      background: #229954;
      transform: translateY(-1px);
    }

    .btn-check.speaking {
      background: var(--accent2);
      animation: pulse 1.2s infinite;
    }

    .btn-check:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .model-answer-reveal {
      background: white;
      border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 2px;
      padding: 18px 22px;
      margin-bottom: 16px;
      animation: slideIn 0.3s ease;
    }

    .model-answer-reveal .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .model-answer-reveal #model-answer-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.6;
    }

    .feedback-box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 24px 28px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .feedback-box.visible {
      display: block;
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .score-badge {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      padding: 4px 12px;
      border-radius: 1px;
    }

    .score-great {
      background: #d5f5e3;
      color: #1a7a44;
      border: 1px solid #27ae60;
    }

    .score-ok {
      background: #fef9e7;
      color: #7d6608;
      border: 1px solid #f0b429;
    }

    .score-retry {
      background: #fdedec;
      color: #922b21;
      border: 1px solid var(--accent);
    }

    .feedback-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--ink);
      white-space: pre-wrap;
    }

    .model-answer {
      margin-top: 16px;
      background: var(--paper);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    .model-answer .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .btn-nav {
      background: transparent;
      border: 2px solid var(--ink);
      color: var(--ink);
      padding: 11px 24px;
      font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      flex: 1;
    }

    .btn-nav:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-nav.primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-nav.primary:hover {
      background: #2c2213;
    }

    .mode-selector {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border: 2px solid var(--ink);
      border-radius: 2px;
      overflow: hidden;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-family: 'Noto Sans Khmer', 'Noto Serif KR', serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      letter-spacing: 0.04em;
      transition: all 0.2s;
      border-right: 1px solid var(--ink);
    }

    .mode-btn:last-child {
      border-right: none;
    }

    .mode-btn.active {
      background: var(--ink);
      color: var(--paper);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--paper2) 25%, var(--border) 50%, var(--paper2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 2px;
      height: 16px;
      margin-bottom: 8px;
    }

    @keyframes shimmer {
      to {
        background-position: -200% 0;
      }
    }

    .no-mic-msg {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px 16px;
      font-size: 13px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .btn-speak {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1.5px solid var(--accent2);
      color: var(--accent2);
      padding: 6px 14px;
      font-family: 'Noto Sans Khmer', serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .btn-speak:hover {
      background: var(--accent2);
      color: white;
    }

    .btn-speak.speaking {
      background: var(--accent2);
      color: white;
    }

    /* Self-assessment panel (shown after recording since AI can't hear audio) */
    .self-check {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px 20px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.8;
    }

    .self-check .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .self-check-items {
      list-style: none;
    }

    .self-check-items li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .self-check-items li::before {
      content: '☐';
      font-size: 16px;
      line-height: 1.2;
      color: var(--accent);
      flex-shrink: 0;
    }

    .api-banner {
      background: #fffbf0;
      border-bottom: 2px solid var(--accent2);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .api-banner label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .api-banner input {
      flex: 1;
      min-width: 180px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .api-banner input:focus {
      border-color: var(--accent2);
    }

    .api-banner input.saved {
      border-color: var(--green);
      background: #f0faf4;
    }

    .api-save-btn {
      font-family: 'Noto Sans Khmer', serif;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      background: var(--accent2);
      color: white;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .api-save-btn:hover {
      background: #d35400;
    }

    .api-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--green);
      display: none;
    }

    .api-status.visible {
      display: inline;
    }

    .api-help {
      font-size: 11px;
      color: var(--muted);
      width: 100%;
      margin-top: 2px;
    }

    .api-help a {
      color: var(--accent2);
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>តេស្តនិយាយភាសាកូរ៉េ — អនុវត្ត</h1>
    <span>Korean Oral Test Practice · មីនា</span>
  </header>
  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  </div>

  <div class="container">

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="all">ទាំងអស់</button>
      <button class="mode-btn" data-mode="q01">Q01 ម៉ោង</button>
      <button class="mode-btn" data-mode="q02">Q02 តម្លៃ</button>
      <button class="mode-btn" data-mode="q03">Q03 លេខ</button>
      <button class="mode-btn" data-mode="q04">Q04 ទីកន្លែង</button>
      <button class="mode-btn" data-mode="free">សន្ទនា</button>
    </div>

    <div id="test-area">
      <div class="question-card" id="question-card">
        <div class="q-meta">
          <span class="q-tag" id="q-tag">Q01</span>
          <span class="q-counter" id="q-counter">1 / 30</span>
        </div>
        <div class="q-prompt" id="q-prompt">Loading...</div>
        <div class="q-pattern" id="q-pattern"></div>
        <button class="btn-speak" id="btn-speak" onclick="speakQuestion()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <span id="speak-label">ស្តាប់សំណួរ</span>
        </button>
        <div class="q-hint" id="q-hint" style="display:none">
          <div class="label">ព័ត៌មានជំនួយ / Input</div>
          <div id="q-hint-text"></div>
        </div>
      </div>

      <div class="no-mic-msg" id="no-mic-msg">
        ⚠️ មិនអាចចូលដំណើរការមីក្រូហ្វូនបានទេ។ សូមអនុញ្ញាតការចូលដំណើរការក្នុងការកំណត់កម្មវិធីរុករករបស់អ្នក។
      </div>

      <div class="controls">
        <button class="btn-record" id="btn-record" onclick="toggleRecord()">
          <div class="dot"></div>
          <span id="btn-label">ចាប់ផ្តើមថត</span>
        </button>
        <div class="timer" id="timer">0:00</div>
        <div class="waveform" id="waveform">
          <div class="waveform-bar" style="animation-delay:0s"></div>
          <div class="waveform-bar" style="animation-delay:0.1s"></div>
          <div class="waveform-bar" style="animation-delay:0.2s"></div>
          <div class="waveform-bar" style="animation-delay:0.15s"></div>
          <div class="waveform-bar" style="animation-delay:0.05s"></div>
          <div class="waveform-bar" style="animation-delay:0.25s"></div>
          <div class="waveform-bar" style="animation-delay:0.1s"></div>
        </div>
      </div>

      <div class="answer-section" id="answer-section">

        <!-- Custom audio player -->
        <div class="audio-player-custom" id="audio-player-custom">
          <button class="audio-play-btn" id="audio-play-btn" onclick="toggleAudioPlay()">
            <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24">
              <polygon points="5,3 19,12 5,21" />
            </svg>
          </button>
          <div class="audio-progress-wrap" id="audio-progress-wrap" onclick="seekAudio(event)">
            <div class="audio-progress-fill" id="audio-progress-fill"></div>
          </div>
          <div class="audio-time" id="audio-time">0:00</div>
        </div>

        <!-- Hidden native audio element -->
        <audio id="audio-playback"></audio>

        <!-- Self-check list shown before AI feedback -->
        <div class="self-check" id="self-check" style="display:none">
          <div class="label">ពិនិត្យខ្លួនឯង / Self-check</div>
          <ul class="self-check-items" id="self-check-items"></ul>
        </div>

        <button class="btn-check" id="btn-check" onclick="speakAnswer()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <span id="check-label">ស្តាប់ចម្លើយគំរូ</span>
        </button>

        <div class="model-answer-reveal" id="model-answer-box" style="display:none">
          <div class="label">ចម្លើយគំរូ / Model Answer</div>
          <div id="model-answer-text"></div>
        </div>
      </div>

      { tag: '자유', pattern: '네, 조금 알아요.', prompt: '한국 노래를 알아요?', hint: 'ស្គាល់បទចម្រៀងកូរ៉េអត់?', answer: '네, 조금 알아요.', checks: ['조금 알아요?'] },
      { tag: '자유', pattern: 'K-pop을 좋아해요.', prompt: '노래를 좋아해요?', hint: 'ចូលចិត្តច្រៀង/ស្តាប់ចម្រៀងអត់?', answer: '네, 좋아해요. K-pop을 좋아해요.', checks: ['좋아해요?'] },
      { tag: '자유', pattern: '팝 음악을 좋아해요.', prompt: '어떤 음악을 좋아해요?', hint: 'ប្រភេទតន្ត្រី', answer: '팝 음악을 좋아해요.', checks: ['팝 (Pop)?'] },
      { tag: '자유', pattern: '집에 가요.', prompt: '보통 수업 후에 뭐 해요?', hint: 'ធ្វើអ្វីក្រោយចេញពីរៀន', answer: '집에 가요. / 친구와 밥을 먹어요.', checks: ['수업 후 (after class)?'] },
      { tag: '자유', pattern: '영화를 봐요.', prompt: '시간이 있을 때 뭐 해요?', hint: 'ពេលមានពេលទំនេរ', answer: '영화를 봐요.', checks: ['~을 때 (when)?'] },
      { tag: '자유', pattern: '네, 있어요.', prompt: '보통 주말에 시간이 있어요?', hint: 'មានពេលនៅចុងសប្តាហ៍អត់?', answer: '네, 있어요.', checks: ['있어요?'] },
      { tag: '자유', pattern: '아니요, 안 바빠요.', prompt: '이번 주 토요일에 바빠요?', hint: 'រវល់អត់ថ្ងៃសៅរ៍នេះ?', answer: '아니요, 안 바빠요.', checks: ['안 바빠요?'] },
      { tag: '자유', pattern: '카페에서 만나요.', prompt: '보통 어디에서 친구를 만나요?', hint: 'កន្លែងជួបមិត្តភក្តិ', answer: '카페에서 만나요.', checks: ['카페 (cafe)?'] }
    ];

    const MODES = {
      all: QUESTIONS,
      q01: QUESTIONS.filter(q => q.tag === 'Q01'),
      q02: QUESTIONS.filter(q => q.tag === 'Q02'),
      q03: QUESTIONS.filter(q => q.tag === 'Q03'),
      q04: QUESTIONS.filter(q => q.tag === 'Q04'),
      free: QUESTIONS.filter(q => q.tag === '자유'),
    };

    let currentMode = 'all';
    let questions = [...QUESTIONS];
    let currentIndex = 0;

    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let recordingInterval = null;
    let recordSeconds = 0;
    let isRecording = false;
    let audioContext = null;
    let currentAudio = null;

    // ── Get best supported MIME type ──────────────────────────────
    function getSupportedMimeType() {
      const types = [
        'audio/mp4',
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/ogg;codecs=opus',
        'audio/ogg',
      ];
      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return '';
    }

    function setMode(mode) {
      currentMode = mode;
      questions = [...MODES[mode]];
      currentIndex = 0;

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      resetQuestion();
      renderQuestion();
    }
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        setMode(btn.dataset.mode);
      });
    });

    function renderQuestion() {
      const q = questions[currentIndex];
      document.getElementById('q-tag').textContent = q.tag;
      document.getElementById('q-counter').textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById('q-prompt').textContent = q.prompt;
      document.getElementById('q-pattern').textContent = 'គំរូ: ' + q.pattern;
      document.getElementById('q-hint').style.display = 'block';
      document.getElementById('q-hint-text').textContent = q.hint;
      document.getElementById('model-answer-text').textContent = q.answer;
      document.getElementById('progress').style.width = ((currentIndex + 1) / questions.length * 100) + '%';
      document.getElementById('btn-prev').disabled = currentIndex === 0;
      document.getElementById('btn-next').disabled = currentIndex === questions.length - 1;
      resetQuestion();
    }


    function resetQuestion() {
      stopSpeech();
      silentStopRecording();
      stopAudio();
      document.getElementById('answer-section').classList.remove('visible');
      document.getElementById('feedback-box')?.classList.remove('visible');
      document.getElementById('model-answer-box').style.display = 'none';
      document.getElementById('self-check').style.display = 'none';
      document.getElementById('btn-record').className = 'btn-record';
      document.getElementById('btn-label').textContent = 'ចាប់ផ្តើមថត';
      document.getElementById('timer').textContent = '0:00';
      document.getElementById('waveform').classList.remove('active');
      document.getElementById('audio-progress-fill').style.width = '0%';
      document.getElementById('audio-time').textContent = '0:00';
      audioBlob = null;
      audioChunks = [];
      isRecording = false;
    }

    async function toggleRecord() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioChunks = [];

        const mimeType = getSupportedMimeType();
        const options = mimeType ? { mimeType } : {};

        mediaRecorder = new MediaRecorder(stream, options);

        mediaRecorder.ondataavailable = e => {
          if (e.data && e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());

          const mime = mediaRecorder.mimeType || mimeType || 'audio/webm';
          audioBlob = new Blob(audioChunks, { type: mime });

          // Revoke any previous URL
          const audioEl = document.getElementById('audio-playback');
          if (audioEl.src) URL.revokeObjectURL(audioEl.src);

          const url = URL.createObjectURL(audioBlob);
          audioEl.src = url;
          audioEl.load();

          // Setup custom player events
          audioEl.onloadedmetadata = () => {
            document.getElementById('audio-time').textContent = formatTime(audioEl.duration || 0);
          };
          audioEl.ontimeupdate = updateAudioProgress;
          audioEl.onended = () => {
            document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
          };
          audioEl.onerror = (e) => {
            console.warn('Audio element error:', e);
            // Show native audio as fallback
            audioEl.style.display = 'block';
            document.getElementById('audio-player-custom').style.display = 'none';
          };

          document.getElementById('answer-section').classList.add('visible');
          document.getElementById('feedback-box').classList.remove('visible');

          // Show self-check list
          const q = questions[currentIndex];
          const list = document.getElementById('self-check-items');
          list.innerHTML = q.checks.map(c => `<li>${c}</li>`).join('');
          document.getElementById('self-check').style.display = 'block';
        };

        // Collect data every 250ms for reliability
        mediaRecorder.start(250);
        isRecording = true;
        recordSeconds = 0;

        document.getElementById('btn-record').className = 'btn-record recording';
        document.getElementById('btn-label').textContent = 'ឈប់ថត';
        document.getElementById('waveform').classList.add('active');
        document.getElementById('no-mic-msg').style.display = 'none';

        recordingInterval = setInterval(() => {
          recordSeconds++;
          const m = Math.floor(recordSeconds / 60);
          const s = recordSeconds % 60;
          document.getElementById('timer').textContent = `${m}:${String(s).padStart(2, '0')}`;
          if (recordSeconds >= 30) stopRecording();
        }, 1000);

      } catch (e) {
        console.error('Mic error:', e);
        document.getElementById('no-mic-msg').style.display = 'block';
      }
    }

    function stopRecording() {
      if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      document.getElementById('btn-record').className = 'btn-record';
      document.getElementById('btn-label').textContent = 'ថតម្តងទៀត';
      document.getElementById('waveform').classList.remove('active');
    }

    function silentStopRecording() {
      if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch (e) { }
      }
      isRecording = false;
    }

    // ── Custom audio player controls ──────────────────────────────
    function toggleAudioPlay() {
      const audio = document.getElementById('audio-playback');
      if (!audio.src) return;
      if (audio.paused) {
        audio.play().catch(e => {
          console.warn('Play failed:', e);
          audio.style.display = 'block';
          document.getElementById('audio-player-custom').style.display = 'none';
          audio.play();
        });
        document.getElementById('play-icon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      } else {
        audio.pause();
        document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      }
    }

    function stopAudio() {
      const audio = document.getElementById('audio-playback');
      audio.pause();
      try { audio.currentTime = 0; } catch (e) { }
      document.getElementById('play-icon').innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      document.getElementById('audio-progress-fill').style.width = '0%';
    }

    function updateAudioProgress() {
      const audio = document.getElementById('audio-playback');
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('audio-progress-fill').style.width = pct + '%';
        document.getElementById('audio-time').textContent = formatTime(audio.currentTime);
      }
    }

    function seekAudio(e) {
      const audio = document.getElementById('audio-playback');
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    }

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    // ── Speak model answer ───────────────────────────────────────
    let answerUtterance = null;

    function speakAnswer() {
      const q = questions[currentIndex];
      const btn = document.getElementById('btn-check');
      const label = document.getElementById('check-label');

      // Show the answer text
      document.getElementById('model-answer-box').style.display = 'block';
      document.getElementById('model-answer-text').textContent = q.answer;

      // Stop if already speaking
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btn.classList.remove('speaking');
        label.textContent = 'ស្តាប់ចម្លើយគំរូ';
        return;
      }

      const utter = new SpeechSynthesisUtterance(q.answer);
      utter.lang = 'ko-KR';
      utter.rate = 0.65;
      utter.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const korVoice = voices.find(v => v.lang.startsWith('ko'));
      if (korVoice) utter.voice = korVoice;

      utter.onstart = () => {
        btn.classList.add('speaking');
        label.textContent = 'កំពុងនិយាយ... (ចុចដើម្បីឈប់)';
      };
      utter.onend = utter.onerror = () => {
        btn.classList.remove('speaking');
        label.textContent = 'ស្តាប់ម្តងទៀត 🔁';
      };

      window.speechSynthesis.speak(utter);
    }


    function navigate(dir) {
      const next = currentIndex + dir;
      if (next < 0 || next >= questions.length) return;
      currentIndex = next;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function speakQuestion() {
      const q = questions[currentIndex];
      const btn = document.getElementById('btn-speak');
      const label = document.getElementById('speak-label');

      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btn.classList.remove('speaking');
        label.textContent = 'ស្តាប់សំណួរ';
        return;
      }

      const utter = new SpeechSynthesisUtterance(q.prompt);
      utter.lang = 'ko-KR';
      utter.rate = 0.65;
      utter.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const korVoice = voices.find(v => v.lang.startsWith('ko'));
      if (korVoice) utter.voice = korVoice;

      utter.onstart = () => { btn.classList.add('speaking'); label.textContent = 'កំពុងនិយាយ...'; };
      utter.onend = utter.onerror = () => { btn.classList.remove('speaking'); label.textContent = 'ស្តាប់សំណួរ'; };

      window.speechSynthesis.speak(utter);
    }

    function stopSpeech() {
      if (window.speechSynthesis?.speaking) window.speechSynthesis.cancel();
      const btn = document.getElementById('btn-check');
      if (btn) { btn.classList.remove('speaking'); }
      const lbl = document.getElementById('check-label');
      if (lbl) lbl.textContent = 'ស្តាប់ចម្លើយគំរូ';
      const btnSpeak = document.getElementById('btn-speak');
      const label = document.getElementById('speak-label');
      if (btnSpeak) btnSpeak.classList.remove('speaking');
      if (label) label.textContent = 'ស្តាប់សំណួរ';
    }

    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    renderQuestion();
  </script>
